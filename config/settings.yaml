# Конфигурация базы данных ArcticDB
db:
  uri: "lmdb://data/emiss_db"
  library: "emiss_stats"
  options:
    dynamic_schema: true

# DeepSeek API
deepseek:
  api_key: ${DEEPSEEK_API_KEY}   # или укажите ключ напрямую, но лучше через переменную окружения
  model: "deepseek-v4"
  temperature: 0.7
  max_tokens: 4096

# Пути к данным
data:
  raw_dir: "data/raw"
  db_dir: "data/emiss_db"
  outputs_dir: "outputs"

# Логирование
logging:
  level: "INFO"
  file: "logs/app.log"